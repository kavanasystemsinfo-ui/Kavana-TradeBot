services:
  webhook:
    build: .
    container_name: kavana-webhook
    restart: unless-stopped
    volumes:
      - .:/app
      - /root/kavana-trading-v2/data:/app/data
    environment:
      - TZ=Europe/Madrid
    ports:
      - "8081:8081"
    command: python -m src.webhook

  trading:
    build: .
    container_name: kavana-trading
    depends_on:
      - webhook
    restart: unless-stopped
    volumes:
      - .:/app
      - /root/kavana-trading-v2/data:/app/data
    environment:
      - TZ=Europe/Madrid
      - WEBHOOK_URL=http://localhost:8081/webhook
    env_file:
      - .env
    network_mode: host
